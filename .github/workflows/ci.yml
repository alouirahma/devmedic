name: CI - Build, Tests, Qualité et Images Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-gestion-git:
    name: Build gestion-git
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build avec Maven
        working-directory: devMedic/ms-Backend/gestionGit
        run: mvn clean compile -B

  build-gestion-user:
    name: Build gestion-user
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build avec Maven
        working-directory: devMedic/ms-Backend/gestionUser
        run: mvn clean compile -B

  quality-gate:
    name: Analyse qualité SonarCloud
    needs: [build-gestion-git, build-gestion-user]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compiler les deux services (pour les binaires Java)
        run: |
          cd devMedic/ms-Backend/gestionGit && mvn clean compile -B
          cd ../gestionUser && mvn clean compile -B

      - name: Analyse SonarCloud
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Vérifier le Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build-push-gestion-git:
    name: Build & Push image gestion-git
    needs: [build-gestion-git, build-gestion-user]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push image gestion-git
        uses: docker/build-push-action@v5
        with:
          context: devMedic/ms-Backend/gestionGit
          file: devMedic/ms-Backend/gestionGit/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devmedic-gestion-git:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devmedic-gestion-git:${{ github.sha }}

  docker-build-push-gestion-user:
    name: Build & Push image gestion-user
    needs: [build-gestion-git, build-gestion-user]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push image gestion-user
        uses: docker/build-push-action@v5
        with:
          context: devMedic/ms-Backend/gestionUser
          file: devMedic/ms-Backend/gestionUser/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devmedic-gestion-user:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devmedic-gestion-user:${{ github.sha }}