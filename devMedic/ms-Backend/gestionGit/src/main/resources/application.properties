# ====================== SERVER ======================
server.port=8082

# ====================== APPLICATION ======================
spring.application.name=gestion-git

# ====================== DATABASE ======================
spring.datasource.url=jdbc:postgresql://postgres-app:5432/devmedic
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ====================== JPA ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ====================== EUREKA (AJOUT OBLIGATOIRE) ======================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=gestion-git
eureka.instance.prefer-ip-address=false
# ====================== SWAGGER/OPENAPI ======================
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ====================== SONARQUBE (Analyse qualite du code) ======================
sonar.url=${SONAR_URL:http://sonarqube:9000}
sonar.token=${SONAR_TOKEN:}



#Health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always